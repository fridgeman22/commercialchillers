<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="background:#000;margin:0;padding:20px;">
<canvas id="c512" width="512" height="512"></canvas>
<canvas id="c32" width="32" height="32"></canvas>
<script>
function drawSnowflake(canvas, size) {
  const ctx = canvas.getContext('2d');
  const cx = size/2, cy = size/2;
  const r = size * 0.42;
  const armW = size * 0.045;
  const branchW = size * 0.028;

  // Background
  ctx.fillStyle = '#0f1b2d';
  ctx.fillRect(0, 0, size, size);

  // Glow effect
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grd.addColorStop(0, 'rgba(99,210,255,0.15)');
  grd.addColorStop(1, 'rgba(99,210,255,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, size, size);

  ctx.save();
  ctx.translate(cx, cy);

  // Draw 6 arms
  for (let i = 0; i < 6; i++) {
    ctx.save();
    ctx.rotate((Math.PI / 3) * i);

    // Main arm
    ctx.shadowColor = '#63d2ff';
    ctx.shadowBlur = size * 0.04;
    ctx.fillStyle = '#63d2ff';
    ctx.fillRect(-armW/2, -armW/2, r, armW);

    // Branches at 1/3
    const b1 = r * 0.35;
    const bl = r * 0.22;
    ctx.save();
    ctx.translate(b1, 0);
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-branchW/2, -branchW/2, bl, branchW);
    ctx.rotate(-Math.PI / 2);
    ctx.fillRect(-branchW/2, -branchW/2, bl, branchW);
    ctx.restore();

    // Branches at 2/3
    const b2 = r * 0.62;
    const bl2 = r * 0.16;
    ctx.save();
    ctx.translate(b2, 0);
    ctx.rotate(Math.PI / 4);
    ctx.fillRect(-branchW/2, -branchW/2, bl2, branchW);
    ctx.rotate(-Math.PI / 2);
    ctx.fillRect(-branchW/2, -branchW/2, bl2, branchW);
    ctx.restore();

    ctx.restore();
  }

  // Centre dot
  ctx.beginPath();
  ctx.arc(0, 0, armW * 1.6, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = '#63d2ff';
  ctx.shadowBlur = size * 0.06;
  ctx.fill();

  ctx.restore();
}

drawSnowflake(document.getElementById('c512'), 512);
drawSnowflake(document.getElementById('c32'), 32);

// Download links
['c512','c32'].forEach(id => {
  const c = document.getElementById(id);
  const a = document.createElement('a');
  a.href = c.toDataURL('image/png');
  a.download = id === 'c512' ? 'dcr-logo-512.png' : 'dcr-favicon-32.png';
  a.style.color='white';a.style.display='block';a.style.marginTop='10px';
  a.textContent = 'Download ' + a.download;
  document.body.appendChild(a);
});
</script>
</body>
</html>
